name: Check Dependencies

# Runs whenever compile-sketch.yml is modified.
# Verifies the README library list matches the build workflow and keeps
# install_libraries.py in sync.  Opens a PR automatically when they drift.
on:
  push:
    paths:
      - '.github/workflows/compile-sketch.yml'
  pull_request:
    paths:
      - '.github/workflows/compile-sketch.yml'
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: python -m pip install pyyaml

      - name: Check and sync dependencies
        id: check
        run: python .github/scripts/check_deps.py

      # Only create a PR on direct pushes (not on pull_request events) to
      # avoid recursive PR creation.
      - name: Create PR if dependencies differ
        if: steps.check.outputs.needs_update == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SPACE_API_KEY_GITHUB_PR }}
          commit-message: "sync: update README and install script to match build workflow"
          title: "Sync dependencies: README and install_libraries.py"
          body: |
            The libraries declared in `compile-sketch.yml` differ from those
            documented in `README.md` or recorded in `install_libraries.py`.

            This PR updates:
            - **`README.md`** – Installation section library list
            - **`install_libraries.py`** – Cross-platform library install script

            _Auto-generated by the [check-dependencies workflow](.github/workflows/check-dependencies.yml)._
          branch: sync-dependencies
          delete-branch: true
          labels: dependencies,automated
